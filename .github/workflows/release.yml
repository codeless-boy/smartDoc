name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22 命中 better-sqlite3 v12.11.1 的 node-v127 prebuilt。
          # Node 20 命中 prebuilt 盲区，会回退到 node-gyp 源码编译，
          # 而 windows-latest runner 默认不带 VS C++ 工具链，编译失败。
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Rebuild better-sqlite3 for host Node
        # 强制 better-sqlite3 针对宿主 Node 22（ABI v127）重新拉取 prebuilt，
        # 覆盖任何先前的 ABI 状态。Vitest 跑在宿主 Node 下，需要 v127；
        # 打包阶段 electron-builder 会自行 @electron/rebuild 切到 electron-v128。
        run: npm rebuild better-sqlite3

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:run

      - name: Build & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish
